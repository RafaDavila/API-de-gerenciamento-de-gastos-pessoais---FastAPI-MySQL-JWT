services:
  mysql:
    image: mysql:8.0
    container_name: expense-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: senha
      MYSQL_DATABASE: expense_db
    ports:
      - "3306:3306"
    volumes:
      - expense_mysql_data:/var/lib/mysql

volumes:
  expense_mysql_data:
